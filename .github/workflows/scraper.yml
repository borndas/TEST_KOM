name: Check Alumni Activities

on:
  schedule:
    # 每個小時的第 0 分鐘執行一次 (例如 08:00, 09:00, 10:00...)
    - cron: '0 * * * *'
  workflow_dispatch: # 依然保留手動觸發的功能
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

   steps:
    - name: Checkout repository
      uses: actions/checkout@v3  # 或是 v4
      with:
        fetch-depth: 0   # <--- 加入這行！這告訴 Git 下載完整的歷史紀錄，是解決衝突的關鍵

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        python scraper.py

    - name: Commit state.json if changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 加入檔案
        git add state.json
        
        # 檢查檔案是否有改變
        if ! git diff --staged --quiet; then
          # 1. 先建立本地的 Commit
          git commit -m "chore: update activities state"
          
          # 2. 拉取遠端最新進度並重新排序 (Rebase)
          # 因為有了 fetch-depth: 0，這次的 pull --rebase 絕對能成功接合版本
          git pull --rebase origin main
          
          # 3. 推送上 GitHub
          git push origin main
        else
          echo "state.json 沒有改變，跳過更新。"
        fi
