name: Check Alumni Activities

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# 加入全域環境變數，提前強制 GitHub Actions 使用 Node.js 24，消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      # 將 setup-python 升級到支援新環境的 v5 版本
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 line-bot-sdk

    - name: Run scraper
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        python scraper.py

   - name: Auto Commit state.json
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update activities state"
        file_pattern: "state.json"
        skip_dirty_check: false
        # 加入以下兩行，解決「分支分叉 (diverged)」的問題
        push_options: '--force'  # 如果還是卡住，可以用強制推送
        create_branch: false
