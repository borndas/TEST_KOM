name: Check Alumni Activities

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    # 確保有寫入檔案的權限
    permissions:
      contents: write 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 使用專屬套件時，建議設定完整的 token 權限
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 line-bot-sdk

    - name: Run scraper
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        python scraper.py

    # 放棄手動寫 Git 指令，改用專業的自動 Commit 套件
    - name: Auto Commit state.json
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update activities state"
        file_pattern: "state.json"
        skip_dirty_check: false
