name: Check Alumni Activities

on:
  schedule:
    # 每個小時的第 0 分鐘執行一次 (例如 08:00, 09:00, 10:00...)
    - cron: '0 * * * *'
  workflow_dispatch: # 依然保留手動觸發的功能
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        python scraper.py

    - name: Commit state.json if changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add state.json
        
        # 檢查是否有檔案更動
        if ! git diff --staged --quiet; then
          git commit -m "chore: update activities state"
          
          # 嘗試先拉取最新的變更，並指定合併策略 (如果發生衝突則優先保留遠端版本，或自動處理)
          # 使用 --no-rebase 進行一般合併，避免 rebase 可能帶來的複雜衝突
          git pull origin main --no-rebase -X ours || true 
          
          # 再次推送到遠端
          git push origin main
        else
          echo "No changes to state.json, skipping commit."
        fi
