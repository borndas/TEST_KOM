name: Check Alumni Activities

on:
  schedule:
    # 每天早上 8 點執行一次 (UTC時間 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動觸發執行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        python scraper.py

    - name: Commit state.json if changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add state.json
        # 如果 state.json 有更動才進行 commit 和 push
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update activities state" && git push)
