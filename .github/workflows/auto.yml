name: Hourly Scheduled Task

on:
  # 設定排程
  schedule:
    # 這裡的 cron 語法 '0 * * * *' 代表「每小時的第 0 分鐘」執行一次
    - cron: '0 * * * *'
    
  # 加入 workflow_dispatch 允許您隨時手動點擊執行，方便測試
  workflow_dispatch:

jobs:
  run-hourly-job:
    runs-on: ubuntu-latest

    steps:
      # 1. 取得儲存庫的程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 執行您的自訂指令 (這裡以 Echo 測試為例)
      - name: Run my script
        run: |
          echo "這是一個每小時執行一次的任務！"
          echo "現在時間是：$(date)"
          # 在這裡替換成您實際要執行的指令，例如：
          # python auto.py 
          # npm run start