name: Hourly Scheduled Task

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# 新增這段環境變數，強制使用 Node.js 24 來消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-hourly-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 您可以指定您本機使用的 Python 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 line-bot-sdk
      - name: Run my script
        run: |
          echo "這是一個每小時執行一次的任務！"
          echo "現在時間是：$(date)"
          python main.py
